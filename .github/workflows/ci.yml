name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 now, removes deprecation warnings

jobs:
  # ── Step 1: build shared workspace packages once ───────────────────────────
  packages:
    name: Build Workspace Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4   # reads version from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @repo/types
        run: pnpm --filter @repo/types build

      - name: Generate Prisma + build @repo/database
        run: pnpm --filter @repo/database build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # actions/cache is best-effort and can silently restore a stale entry —
      # wrong for something type-checking depends on for correctness (it once
      # let a Prisma client from before newer models existed pass silently).
      # Artifacts are scoped to this run only, so web/api are guaranteed to
      # get exactly what this job just built. Tarring first sidesteps a
      # upload-artifact quirk: given multiple paths, it collapses them to
      # their *least common ancestor* instead of preserving full paths from
      # the repo root, which silently relocated these to the wrong directory.
      - name: Archive built packages
        run: tar -czf built-packages.tar.gz packages/types/dist packages/database/dist packages/database/generated

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: built-packages.tar.gz
          retention-days: 1

  # ── Step 2a: Web (Next.js) — runs after packages ──────────────────────────
  web:
    name: Web — Type Check & Build
    runs-on: ubuntu-latest
    needs: packages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Extract built packages
        run: tar -xzf built-packages.tar.gz

      - name: Type check (web)
        run: pnpm --filter web check-types

      - name: Build web
        run: pnpm --filter web build

  # ── Step 2b: API (Node/Express) — runs after packages ─────────────────────
  api:
    name: API — Type Check & Build
    runs-on: ubuntu-latest
    needs: packages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Extract built packages
        run: tar -xzf built-packages.tar.gz

      - name: Type check (api)
        run: pnpm --filter @repo/api check-types

      - name: Build api
        run: pnpm --filter @repo/api build
