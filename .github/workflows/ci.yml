name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 now, removes deprecation warnings

jobs:
  # Each job builds its own @repo/types + @repo/database from scratch rather
  # than sharing a cross-job cache — a stale cached Prisma client (generated
  # before newer models existed) silently passed type-checking against the
  # wrong shape. Only the pnpm store is cached (safe: it's just downloaded
  # packages, never generated code), so `pnpm install` stays fast.
  web:
    name: Web — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4   # reads version from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @repo/types
        run: pnpm --filter @repo/types build

      - name: Generate Prisma + build @repo/database
        run: pnpm --filter @repo/database build

      - name: Type check (web)
        run: pnpm --filter web check-types

      - name: Build web
        run: pnpm --filter web build

  api:
    name: API — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @repo/types
        run: pnpm --filter @repo/types build

      - name: Generate Prisma + build @repo/database
        run: pnpm --filter @repo/database build

      - name: Type check (api)
        run: pnpm --filter @repo/api check-types

      - name: Build api
        run: pnpm --filter @repo/api build
